# Build and upload to PyPI using trusted publishing (OIDC). No long-lived PyPI
# token is stored in GitHub.
#
# One-time PyPI setup (per project):
# 1. https://pypi.org/manage/project/fastmvc-cli/settings/publishing/ (or your project name)
# 2. "Add a new pending publisher" → GitHub → fill owner, repository, workflow name:
#    publish-pypi.yml
# 3. Save; the publisher activates after the first successful upload from this workflow.
#
# Local uploads can still use an API token with twine (see README).
#
# Release: bump __version__ in fastx_cli/__init__.py, then:
#   git tag v1.5.1 && git push origin v1.5.1

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run tests (same as CI)
        run: python -m pytest

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke-test wheel in clean venv
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/pip install --upgrade pip
          .venv-smoke/bin/pip install dist/*.whl
          .venv-smoke/bin/python -m fastx_cli.app --help
          .venv-smoke/bin/python -m fastx_cli.app doctor

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
