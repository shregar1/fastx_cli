# Run tests + coverage on every PR and push to the default branch.
# Optional Ruff / Mypy run in a separate job (non-blocking until clean).
# Release uploads stay in publish-pypi.yml (tag pushes only).

name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest

  # Subprocess smoke (Linux + Windows); --no-cov so this job is independent of line coverage.
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Subprocess smoke tests
        run: python -m pytest tests/test_smoke_cli.py -q --no-cov

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check fastx_cli tests

      - name: Mypy
        run: mypy fastx_cli
